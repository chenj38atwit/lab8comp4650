<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Student | Student Performance Management System</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="navbar">
    <div class="brand">Student Performance Management System</div>
    <nav>
      <a href="index.html">Dashboard</a>
      <a href="students.html">Student Records</a>
      <a href="add.html" class="active">Add Student</a>
      <a href="reports.html">Reports</a>
    </nav>
  </header>

  <main>
    <div class="page-header">
      <h1>Add Student Record</h1>
      <p>Enter the student's details. The letter grade, performance meaning, color label, and pass/fail status are calculated automatically.</p>
    </div>

    <div id="alertContainer"></div>

    <div class="card">
      <form id="addStudentForm" novalidate>
        <div class="form-grid">
          <div class="form-group full">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="e.g. Jordan Lee" required />
            <div class="field-error" id="nameError"></div>
          </div>

          <div class="form-group">
            <label for="major">Major / Program of Study</label>
            <select id="major" required>
              <option value="">Select a major&hellip;</option>
            </select>
            <div class="field-error" id="majorError"></div>
          </div>

          <div class="form-group">
            <label for="course">Course</label>
            <select id="course" required disabled>
              <option value="">Select a major first&hellip;</option>
            </select>
            <div class="field-error" id="courseError"></div>
          </div>

          <div class="form-group full">
            <label for="marks">Marks (0&ndash;100)</label>
            <input type="number" id="marks" min="0" max="100" step="0.01" placeholder="e.g. 88" required />
            <div class="field-error" id="marksError"></div>
          </div>
        </div>

        <div class="card" style="background:#f7f9fc; margin-top:1.25rem;" id="previewCard" hidden>
          <strong>Preview:</strong>
          <span id="previewBadge"></span>
          <span id="previewMeaning" class="text-muted"></span>
          &mdash;
          <span id="previewStatus"></span>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Add Student</button>
          <button type="reset" class="btn btn-secondary" id="resetBtn">Clear Form</button>
        </div>
      </form>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="js/api.js"></script>
  <script src="js/grading.js"></script>
  <script src="js/addStudent.js"></script>
</body>
</html>
